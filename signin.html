<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Webhook Converter API</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
  <style>
    :root{--bg-primary:#0a0e1a;--bg-card:#151d2e;--bg-input:#0f1420;--text-primary:#e8ecf4;--text-secondary:#8b97b0;--text-muted:#5a6578;--accent:#00e5a0;--accent-glow:rgba(0,229,160,0.15);--accent-secondary:#38bdf8;--border:rgba(255,255,255,0.06);--border-accent:rgba(0,229,160,0.25);--border-input:rgba(255,255,255,0.1);--error:#f87171;--error-glow:rgba(248,113,113,0.1);--radius:12px;--radius-sm:8px;--font-display:'Outfit',sans-serif;--font-serif:'Fraunces',serif;--font-mono:'JetBrains Mono',monospace}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}html{font-size:16px}
    body{font-family:var(--font-display);background:var(--bg-primary);color:var(--text-primary);line-height:1.65;min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(0,229,160,0.06),transparent),radial-gradient(ellipse 60% 40% at 80% 60%,rgba(56,189,248,0.04),transparent);pointer-events:none;z-index:0}
    body>*{position:relative;z-index:1}
    .grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:64px 64px;pointer-events:none;z-index:0;mask-image:radial-gradient(ellipse 70% 50% at 50% 30%,black,transparent)}
    .container{max-width:1120px;margin:0 auto;padding:0 24px}
    header{padding:16px 0;border-bottom:1px solid var(--border);background:rgba(10,14,26,0.8);backdrop-filter:blur(16px)}
    .nav-inner{display:flex;align-items:center;justify-content:space-between}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;font-weight:700;font-size:1.1rem;color:var(--text-primary)}
    .logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent-secondary));border-radius:10px;display:grid;place-items:center;font-size:1.1rem;box-shadow:0 0 20px var(--accent-glow)}
    .nav-links{display:flex;gap:24px;align-items:center}
    .nav-links a{text-decoration:none;color:var(--text-secondary);font-size:.875rem;font-weight:500;transition:color .2s}
    .nav-links a:hover{color:var(--text-primary)}.nav-links a.active{color:var(--accent)}
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 24px}
    .auth-card{max-width:420px;width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:48px 40px;box-shadow:0 24px 80px rgba(0,0,0,0.4);animation:fadeUp .6s ease-out both}
    @media(max-width:480px){.auth-card{padding:32px 24px}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .form-header{margin-bottom:28px}.form-header h1{font-size:1.5rem;font-weight:700;margin-bottom:6px}.form-header p{color:var(--text-muted);font-size:.88rem}
    .form-group{margin-bottom:18px}
    .form-group label{display:block;font-size:.82rem;font-weight:600;color:var(--text-secondary);margin-bottom:6px}
    .form-group input{width:100%;padding:11px 14px;font-family:var(--font-display);font-size:.9rem;background:var(--bg-input);border:1px solid var(--border-input);border-radius:var(--radius-sm);color:var(--text-primary);outline:none;transition:border-color .2s,box-shadow .2s}
    .form-group input::placeholder{color:var(--text-muted)}
    .form-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
    .form-row-between{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;font-size:.82rem}
    .checkbox-wrap{display:flex;align-items:center;gap:6px;color:var(--text-muted);cursor:pointer}
    .checkbox-wrap input{accent-color:var(--accent);width:14px;height:14px}
    .forgot-link{color:var(--accent);text-decoration:none;font-size:.82rem}.forgot-link:hover{text-decoration:underline}
    .btn-submit{width:100%;padding:14px;font-family:var(--font-display);font-size:.95rem;font-weight:600;background:var(--accent);color:var(--bg-primary);border:none;border-radius:var(--radius-sm);cursor:pointer;transition:all .25s;box-shadow:0 0 30px var(--accent-glow)}
    .btn-submit:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 0 50px rgba(0,229,160,0.25)}
    .btn-submit:disabled{opacity:.6;cursor:not-allowed}
    .btn-submit .spinner{display:none;width:18px;height:18px;border:2px solid rgba(10,14,26,0.3);border-top-color:var(--bg-primary);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto}
    .btn-submit.loading .btn-text{display:none}.btn-submit.loading .spinner{display:block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .form-footer{margin-top:18px;text-align:center;font-size:.82rem;color:var(--text-muted)}.form-footer a{color:var(--accent);text-decoration:none}
    .alert{padding:12px 16px;border-radius:var(--radius-sm);font-size:.85rem;margin-bottom:18px;display:none}.alert.show{display:block}.alert.error{background:var(--error-glow);border:1px solid rgba(248,113,113,0.2);color:var(--error)}
    footer{padding:24px 0;border-top:1px solid var(--border);text-align:center}footer p{font-size:.82rem;color:var(--text-muted)}
  </style>
</head>
<body>
  <div class="grid-bg" aria-hidden="true"></div>

  <header>
    <div class="container">
      <nav class="nav-inner">
        <a href="index.html" class="logo"><span class="logo-icon">⚡</span>Webhook Converter</a>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="register.html">Register</a>
          <a href="signin.html" class="active">Sign In</a>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <div class="auth-card">
      <div class="form-header">
        <h1>Welcome back</h1>
        <p>Sign in to manage your API key and reports.</p>
      </div>
      <div class="alert error" id="alertError"></div>

      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="Your password" autocomplete="current-password">
      </div>
      <div class="form-row-between">
        <label class="checkbox-wrap">
          <input type="checkbox" id="rememberMe"> <span>Remember me</span>
        </label>
        <a href="forgot.html" class="forgot-link">Forgot password?</a>
      </div>

      <button class="btn-submit" id="submitBtn" onclick="handleLogin()">
        <span class="btn-text">Sign In →</span>
        <div class="spinner"></div>
      </button>
      <p class="form-footer">Don't have an account? <a href="register.html">Create one</a></p>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>© 2026 Webhook Converter API</p>
    </div>
  </footer>

  <script>
    const API_BASE = 'https://webhooker-production.up.railway.app';

    async function handleLogin() {
      const email = document.getElementById('loginEmail');
      const pass = document.getElementById('loginPass');
      const btn = document.getElementById('submitBtn');
      const alertEl = document.getElementById('alertError');

      alertEl.classList.remove('show');
      if (!email.value.trim() || !pass.value) {
        alertEl.textContent = 'Please enter your email and password.';
        alertEl.classList.add('show');
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const res = await fetch(API_BASE + '/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: email.value.trim(),
            password: pass.value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || data.message || 'Invalid credentials');

        localStorage.setItem('wc_token', data.token || data.session_token || '');
        localStorage.setItem('wc_email', email.value.trim());
        window.location.href = 'account.html';
      } catch (err) {
        alertEl.textContent = err.message;
        alertEl.classList.add('show');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    // Allow Enter key to submit
    document.querySelectorAll('input').forEach(i => {
      i.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleLogin();
      });
    });
  </script>
</body>
</html>
